<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
       background: linear-gradient(135deg, #6F81E9, #A5B4FC);
        color: #532A22;
        text-align: center;
    }

    h1 {
        margin-top: 40px;
        font-size: 2.5rem;
        letter-spacing: 2px;
    }

    .contenedor {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 40px;
        margin-top: 60px;
        padding-bottom: 60px;
    }

    .card {
        background: rgba(111, 190, 233);
        padding: 20px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    }

    .card img {
        width: 180px;
        border-radius: 10px;
        cursor: pointer;
    }

    .card p {
        margin-top: 10px;
        font-weight: bold;
        font-size: 1rem;
        letter-spacing: 1px;
    }

    footer {
        margin-top: 40px;
        padding: 20px;
        font-size: 0.9rem;
        opacity: 0.7;
    }
</style>

</head>
<body>

<h1>🗿 MI PROYECTO WEB</h1>

<div class="contenedor">

    <a href="https://neal.fun/" target="_blank" class="card">
        <img src="imagen1.jpg" alt="Google">
        <p>Neal FUN</p>
    </a>

    <a href="https://pointerpointer.com/" target="_blank" class="card">
        <img src="imagen2.jpg" alt="ChatGPT">
        <p>Pointer point</p>
    </a>

    <a href="https://hackertyper.net/" target="_blank" class="card">
        <img src="imagen3.jpg" alt="YouTube">
        <p>Hacker typer</p>
    </a>

    <a href="https://www.koalastothemax.com/" target="_blank" class="card">
        <img src="imagen4.jpg" alt="Spotify">
        <p>Koala</p>
    </a>

    <a href="https://kiritsuguemiya1973-web.github.io/hoja-de-vida/" target="_blank" class="card">
        <img src="imagen5.jpg" alt="Spotify">
        <p>Hoja de Vida</p>
		</a>

</div>

<footer>
   GRACIAS POR VISITAR ESTA PAGINA <br>
 (ahora ve a perder tu tiempo en otro lado)
</footer>

</body>
</html>
